services:
  bedjet-bridge:
    container_name: bedjet-bridge
    build:
      context: ../../bridge
    restart: unless-stopped
    env_file:
      - bridge.env
    ports:
      - "${BRIDGE_PORT:-8787}:8787"
    volumes:
      - ../../bridge-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/healthz').then((r)=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
